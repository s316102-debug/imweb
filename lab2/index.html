<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照相亭 - Lab 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --primary: #ec4899;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: #fff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(45deg, #0f172a 0%, #334155 100%);
        }
        .booth {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .camera-screen {
            width: 100%;
            max-width: 600px;
            height: 400px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .camera-screen::after {
            content: '';
            position: absolute;
            top: 10px; right: 10px;
            width: 12px; height: 12px;
            background: #ef4444;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        .capture-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin: 0 auto;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .capture-btn:active { transform: scale(0.9); }
        .gallery {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            min-height: 80px;
        }
        .photo-placeholder {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .back-link { display: block; margin-top: 20px; color: #cbd5e1; text-decoration: none; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="booth">
        <h2 style="margin-top:0;">📸 Web Photo Booth</h2>
        <div class="camera-screen">
            <span style="color:#64748b;">(Video Stream Placeholder)</span>
        </div>
        <button class="capture-btn">📷</button>
        <div class="gallery">
            <div class="photo-placeholder"></div>
            <div class="photo-placeholder"></div>
            <div class="photo-placeholder"></div>
        </div>
    </div>
    <a href="../index.html" class="back-link">← 返回首頁</a>
</body>
</html>
