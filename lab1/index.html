<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猜歌遊戲 - Lab 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1b4b;
            --panel: #312e81;
            --accent: #818cf8;
            --text: #e0e7ff;
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--bg), #000);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            background: rgba(49, 46, 129, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .vinyl-record {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: conic-gradient(#111 0deg, #333 45deg, #111 90deg, #333 135deg, #111 180deg, #333 225deg, #111 270deg, #333 315deg, #111 360deg);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            animation: spin 4s linear infinite;
            animation-play-state: paused;
        }
        .vinyl-record.playing { animation-play-state: running; }
        .vinyl-center {
            width: 60px;
            height: 60px;
            background: var(--accent);
            border-radius: 50%;
            border: 4px solid #111;
        }
        .controls button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .controls button:hover { transform: scale(1.05); background: #6366f1; }
        .input-group { margin-top: 30px; }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        .back-link {
            display: block;
            margin-top: 30px;
            color: #a5b4fc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="game-container">
        <h2>🎵 聽前奏猜歌名</h2>
        <div class="vinyl-record" id="record">
            <div class="vinyl-center"></div>
        </div>
        <div class="controls">
            <button id="playBtn">播放提示音樂</button>
        </div>
        <div class="input-group">
            <input type="text" placeholder="輸入歌名..." />
        </div>
        <a href="../index.html" class="back-link">← 返回首頁</a>
    </div>

    <script>
        const btn = document.getElementById('playBtn');
        const record = document.getElementById('record');
        let isPlaying = false;
        
        btn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if(isPlaying) {
                record.classList.add('playing');
                btn.textContent = '暫停';
            } else {
                record.classList.remove('playing');
                btn.textContent = '播放提示音樂';
            }
        });
    </script>
</body>
</html>
