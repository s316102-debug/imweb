<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>石董作品集</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --accent: #f472b6;
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-color);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 114, 182, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            font-size: 3rem;
            margin-bottom: 3rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1.5rem;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 1s ease-out backwards;
        }

        .card:nth-child(1) {
            animation-delay: 0.1s;
            border-top: 4px solid #3b82f6;
        }

        .card:nth-child(2) {
            animation-delay: 0.2s;
            border-top: 4px solid #10b981;
        }

        .card:nth-child(3) {
            animation-delay: 0.3s;
            border-top: 4px solid #8b5cf6;
        }

        .card:nth-child(4) {
            animation-delay: 0.4s;
            border-top: 4px solid #f43f5e;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .card:hover::before {
            left: 150%;
        }

        .card-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: bold;
            opacity: 0.2;
            position: absolute;
            top: -10px;
            right: 10px;
        }

        .card h2 {
            font-size: 1.5rem;
            margin: 1rem 0;
            color: var(--primary);
        }

        .card p {
            color: #cbd5e1;
            font-weight: 300;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <h1>石董作品集</h1>
    <div class="container">
        <a href="lab1/index.html" class="card">
            <div class="card-number">01</div>
            <h2>猜歌遊戲</h2>
            <p>聽前奏猜歌名，挑戰你的音樂記憶力！音樂播放器互動介面設計。</p>
        </a>
        <a href="lab2/index.html" class="card">
            <div class="card-number">02</div>
            <h2>網頁照相亭</h2>
            <p>調用設備攝影鏡頭，拍攝並加上濾鏡特效的出色照片。</p>
        </a>
        <a href="lab3/index.html" class="card">
            <div class="card-number">03</div>
            <h2>有趣貪吃蛇</h2>
            <p>現代感霓虹設計，帶有粒子特效與高分紀錄的經典貪吃蛇遊戲。</p>
        </a>
        <a href="lab4/index.html" class="card">
            <div class="card-number">04</div>
            <h2>互動歡迎看板</h2>
            <p>二林工商專屬看板，提供「粒子爆發」與「3D霓虹光暈」兩種超炫互動視覺特效。</p>
        </a>
    </div>
    <script>
        // 建立背景 Canvas
        const canvas = document.createElement('canvas');
        canvas.id = 'bg-canvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.zIndex = '-1';
        canvas.style.pointerEvents = 'none';
        document.body.prepend(canvas);

        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        let shootingStars = [];
        let staticStarsArray = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });
        
        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        class StaticStar {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 1.5 + 0.2;
                this.baseOpacity = Math.random() * 0.4 + 0.1;
                this.opacity = this.baseOpacity;
                this.twinkleSpeed = Math.random() * 0.01 + 0.005;
                this.twinkleDir = Math.random() > 0.5 ? 1 : -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
            update() {
                // 微微閃爍效果
                this.opacity += this.twinkleSpeed * this.twinkleDir;
                if(this.opacity > this.baseOpacity + 0.3) {
                    this.twinkleDir = -1;
                } else if (this.opacity < 0.05) {
                    this.twinkleDir = 1;
                }
                this.draw();
            }
        }

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                if(mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    // 擴大吸引範圍
                    if (distance < mouse.radius * 2) {
                        const force = (mouse.radius * 2 - distance) / (mouse.radius * 2);
                        const dirX = dx / distance;
                        const dirY = dy / distance;
                        // 改為吸引效果 (向滑鼠靠近)
                        this.x += dirX * force * 2.5;
                        this.y += dirY * force * 2.5;
                    }
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        class ShootingStar {
            constructor() {
                // 流星從右上方隨機位置出現 (涵蓋畫面右側外部，讓軌跡可以掃過畫面)
                this.x = Math.random() * canvas.width * 1.5;
                this.y = -50;
                this.len = Math.random() * 80 + 40; // 尾巴長度
                this.speedX = -(Math.random() * 6 + 10); // 向左下移動速度 X
                this.speedY = Math.random() * 6 + 10;   // 向左下移動速度 Y
                this.size = Math.random() * 1.5 + 1;
                this.opacity = 1;
            }
            draw() {
                // 畫流星的尾巴
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                const tailX = this.x - this.speedX * this.len * 0.1;
                const tailY = this.y - this.speedY * this.len * 0.1;
                ctx.lineTo(tailX, tailY);
                
                let gradient = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.size;
                ctx.stroke();
                
                // 畫流星的頭部
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                // 隨機衰減漸隱
                this.opacity -= 0.015;
            }
        }

        function spawnShootingStar() {
            shootingStars.push(new ShootingStar());
            // 偶爾 (20%機率) 會一次出現兩顆流星
            if(Math.random() < 0.2) {
                setTimeout(() => { shootingStars.push(new ShootingStar()); }, Math.random() * 500);
            }
            // 加快頻率：2到5秒之間隨機觸發一次
            setTimeout(spawnShootingStar, Math.random() * 3000 + 2000);
        }

        // 啟動流星排程
        setTimeout(spawnShootingStar, Math.random() * 3000 + 2000);

        function init() {
            particlesArray = [];
            staticStarsArray = [];
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // 建立背景固定星星
            let numberOfStaticStars = (canvas.height * canvas.width) / 4000;
            for (let i = 0; i < numberOfStaticStars; i++) {
                staticStarsArray.push(new StaticStar());
            }

            let numberOfParticles = (canvas.height * canvas.width) / 12000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2.5) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.8) - 0.4;
                let directionY = (Math.random() * 0.8) - 0.4;
                let color = 'rgba(56, 189, 248, 0.4)'; // 天藍色粒子
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            // 更新並繪製固定背景星空
            for (let i = 0; i < staticStarsArray.length; i++) {
                staticStarsArray[i].update();
            }
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            
            // 更新並繪製流星
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                shootingStars[i].draw();
                shootingStars[i].update();
                // 如果透明度小於等於0或超出螢幕，移除它
                if (shootingStars[i].opacity <= 0 || shootingStars[i].y > canvas.height || shootingStars[i].x < 0) {
                    shootingStars.splice(i, 1);
                }
            }

            connect();
        }
        
        function connect() {
            // 與游標連線的雷射效果
            for(let a = 0; a < particlesArray.length; a++) {
                if(mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - particlesArray[a].x;
                    let dy = mouse.y - particlesArray[a].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < mouse.radius) {
                        ctx.strokeStyle = `rgba(244, 114, 182, ${0.8 - dist/mouse.radius})`; // 粉紅色連線
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(mouse.x, mouse.y);
                        ctx.lineTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.stroke();
                    }
                }
            }
        }

        init();
        animate();
    </script>
</body>

</html>
